# Arşiv (apps/_arsiv) bilinçli olarak workspace DIŞINDA tutulur:
# çekirdek değişiklik kapısı (pnpm verify) arşivi derlemez. (ANAYASA §4.6)
packages:
  - 'packages/*'
  - 'apps/*'
  - '!apps/_arsiv/**'

# Kurulum sırasında script çalıştırmasına izin verilen bağımlılıklar
# (pnpm güvenlik gereği varsayılan olarak engeller).
allowBuilds:
  unrs-resolver: true

# NativeWind v5 dokümantasyonunun önerisi: lightningcss sürümü sabitlenmezse
# global.css derlenirken seri hale getirme hataları görülebiliyor.
overrides:
  lightningcss: 1.30.1

minimumReleaseAgeExclude:
  - '@expo/cli@56.1.15'
  - '@expo/log-box@56.0.13'
  - '@expo/metro-config@56.0.14'
  - '@expo/metro-runtime@56.0.15'
  - '@expo/ui@56.0.17'
  - babel-preset-expo@56.0.15
  - expo-asset@56.0.17
  - expo-constants@56.0.18
  - expo-file-system@56.0.8
  - expo-font@56.0.6
  - expo-image@56.0.11
  - expo-linking@56.0.14
  - expo-modules-core@56.0.16
  - expo-modules-jsi@56.0.9
  - expo-router@56.2.10
  - expo@56.0.11
